apiVersion: apps/v1
kind: Deployment
metadata:
  name: shydle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shydle
  template:
    metadata:
      labels:
        app: shydle
    spec:
      containers:
        - name: web
          image: shydle:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
